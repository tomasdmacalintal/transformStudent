<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
    	<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
	    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
     	 	* {box-sizing: border-box}
			div{
				transition: all 0.5s;
			}
			
			#roll{
				width: 400px;
				height: 400px;
				margin: 30px auto;
			}
			#roll img{
				width: 70%;
        		opacity: 0.75;
			}
      		#roll img:hover{
				opacity: 1;
			}
			#roll div{
				width: 200px;
				height: 180.5px;
				position: relative;
			}
			#roll div:first-of-type{
				background-color: red;
				top: -381px;
			}
			#roll:hover div:first-of-type{
				transform-origin: top;
				transform: skew(-30deg);
			}
			#roll div:nth-of-type(2){
				background-color: yellow;
				top: -562px;
				left: 200px;
			}
			#roll:hover div:nth-of-type(2){
				transform-origin: top;
				transform: skew(30deg);
			}
			#roll div:nth-of-type(3){
				background-color: blue;
				top: -562px;
			}
			#roll:hover div:nth-of-type(3){
				transform-origin: bottom;
				transform: skew(30deg);
			}
			#roll div:last-of-type{
 				background-color: green;
				 left: 200px;
				 top: -743px;
			}
			#roll:hover div:last-of-type{
				transform-origin: bottom;
				transform: skew(-30deg);
			}
			p {
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div id="roll">
			<p><a href="../index.html"> 
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Tung_tung_tung_sahur.webp/500px-Tung_tung_tung_sahur.webp.png"/>
      </a>
      </p>
			<div></div>
			<div></div>
			<div></div>
			<div></div>
		</div>
    <p>Click on the Image for Home<br/>
    Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>
    
	</body>
</html>
